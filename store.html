<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MuzzieyToxin Store | Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

:root{

--bg:#050505;
--card:rgba(255,255,255,.06);
--text:#fff;
--muted:#9ea4ad;

--green:#00ff88;
--blue:#00c3ff;
--grey:#888;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;
background:#050505;
color:white;
overflow:hidden;

}

/* BACKGROUND */

.bg{
    position:fixed;
    inset:0;

    background:
    linear-gradient(rgba(0,0,0,.52),rgba(0,0,0,.50)),
    url("store2.jpg");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.bg::before{

content:"";

position:absolute;
inset:0;

background:
radial-gradient(circle at 15% 20%,rgba(0,255,136,.18),transparent 30%),
radial-gradient(circle at 85% 40%,rgba(0,195,255,.18),transparent 35%),
radial-gradient(circle at 50% 90%,rgba(255,255,255,.06),transparent 45%);

filter:blur(120px);

animation:float 14s ease-in-out infinite alternate;

}

@keyframes float{

from{
transform:translateY(-20px);
}

to{
transform:translateY(20px);
}

}

/* PAGE */
.wrapper{
    min-height:100vh;
    display:flex;
    justify-content:flex-start;
    align-items:center;
    padding-left:8%;
}
.card{
    width:100%;
    max-width:500px;

    background:
        linear-gradient(rgba(0,0,0,.75), rgba(0,0,0,.75)),
        url("logo.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.12);
    border-radius:24px;

    padding:38px 32px;

    text-align:left;

    box-shadow:0 15px 50px rgba(0,0,0,.45);
}
.notify{
    margin-top:30px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.notify input{
    flex:1;
    min-width:220px;

    padding:14px 16px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,.08);
    color:white;

    font-size:15px;
}

.notify input::placeholder{
    color:#9ea4ad;
}

.notify button{
    padding:14px 24px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    font-weight:700;

    background:linear-gradient(135deg,var(--grey));

    color:#000;

    transition:.3s;
}

.notify button:hover{
    transform:translateY(-3px);
}

.tag{
    display:inline-block;

    padding:6px 12px;

    border-radius:30px;

    background:rgba(0,255,136,.12);

    color:var(--green);

    font-size:12px;

    letter-spacing:1px;

    margin-bottom:18px;
}
.logo{

font-size:18px;

font-weight:700;

letter-spacing:4px;

color:white;

margin-bottom:35px;

}

.logo span{

color:var(--green);

}

.icon{

width:95px;
height:95px;

margin:auto;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

background:linear-gradient(135deg,var(--green),var(--blue));

font-size:42px;

color:black;

margin-bottom:30px;

animation:pulse 3s infinite;

}

@keyframes pulse{

0%{
box-shadow:0 0 0 rgba(0,255,136,.45);
}

50%{
box-shadow:0 0 40px rgba(0,255,136,.45);
}

100%{
box-shadow:0 0 0 rgba(0,255,136,.45);
}

}

.small{

font-family:"JetBrains Mono",monospace;

color:var(--green);

font-size:13px;

letter-spacing:2px;

margin-bottom:18px;

text-transform:uppercase;

}

h1{

font-size:56px;

margin-bottom:18px;

}

p{

max-width:620px;

margin:auto;

line-height:1.8;

color:var(--muted);

font-size:17px;

}

.highlight{

color:white;
font-weight:600;

}

.buttons{

display:flex;

justify-content:center;

gap:15px;

margin-top:45px;

flex-wrap:wrap;

}

.btn{

padding:14px 24px;

border-radius:14px;

font-weight:600;

cursor:pointer;

border:none;

transition:.3s;

font-size:15px;

}

.primary{

background:linear-gradient(135deg,var(--grey),var(--blue));

color:black;

}

.secondary{

background:rgba(255,255,255,.07);

border:1px solid rgba(255,255,255,.1);

color:white;

}

.btn:hover{

transform:translateY(-5px);

}

.footer{

margin-top:40px;

font-size:13px;

color:#777;

}

@media(max-width:768px){

.card{

padding:45px 25px;

}

h1{

font-size:40px;

}

p{

font-size:15px;

}

.buttons{

flex-direction:column;

}

.btn{

width:100%;

}

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="wrapper">

<div class="card">

<div class="tag">
    MUZZIEYTOXIN STORE
</div>

<h1>12/12/2026</h1>

<p>
Exclusive apparel inspired by

<strong>My Wardrobe</strong>,
<strong>And My Mind </strong> 
</p>

<form
    action="https://formspree.io/f/xjgqpazv"
    method="POST"
    class="notify">

    <input
        type="text"
        name="contact"
        placeholder="Email or Phone Number"
        required>

    <button type="submit">
        Get Notified
    </button>

</form>
<div class="buttons">

    <button
        class="btn secondary"
        onclick="window.location.href='index.html'">

        <i class="fas fa-arrow-enter"></i>
        Back to HomePage

    </button>

</div>
<div class="footer">
Be the first to know when our first collection launches.
</div>

</div>

</body>
</html>
